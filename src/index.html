<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI calculator</title>
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <nav class="navbar bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Főoldal</a>
        <a class="navbar-brand" href="nevjegy.html">Névjegy</a>
      </div>
    </nav>

    <h1>Testtömegindex számoló</h1>
    <p>(A normális testtömegindex 18 és 24 közötti szám.)</p>
    <form id="bmiForm">
      <div class="input">
        <label for="mass" class="form-label">Tömeg (kilogramm): </label>
        <input type="text" id="mass" class="form-control">
      </div>
      <div class="input">
        <label for="height" class="form-label">Magasság (méter): </label>
        <input type="text" id="height" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary mt-2">Számít</button>    
      <div>
        <label for="result" class="form-label">Eredmény: </label>
        <input type="text" id="result" class="form-control">
      </div>
    </form>

    <p class="bg-danger" id="warn">Figyelem! Ez a számítás nem veszi figyelembe az eltérő testmagasságokat, ezért nem ad jó eredményt. 
      Alacsonyabb embereknél soványságot, magasabb embereknél testsúlyfelesleget mutathat.</p>
    
  </div>
  <script src="bootstrap.js"></script>
  <script src="app.js" type="module"></script>  
</body>
</html>
